server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=()" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location ~ ^/(api|login|logout|oidc-callback|dashboard|sessione|gestione-concorso|admin|qr-code|qr-pdf|static|frammenti|dispositivi|device-link|checkin-candidato|verifica-candidato) {
        proxy_pass http://backend:5050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Allineato al timeout Gunicorn (120s, vedi Dockerfile) per le chiamate
        # che dipendono da API esterne lente (import candidati, generazione liste).
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
