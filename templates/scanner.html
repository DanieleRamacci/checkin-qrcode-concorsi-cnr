<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.6.1/dist/css/bootstrap-italia.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.6.1/dist/js/bootstrap-italia.bundle.min.js" defer></script>
  <script src="https://unpkg.com/html5-qrcode" defer></script>

  <style>
    #reader-wrapper {
      max-width: 350px;
      margin: 0 auto 20px;
    }
    #reader {
      width: 100%;
      min-height: 200px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    #candidate-card {
      display: none;
    }
    .btn-lg {
      font-size: 1rem;
      padding: 12px 20px;
    }
    #status {
      font-weight: bold;
      margin-top: 10px;
    }
    #candidate-info p {
      margin-bottom: 4px;
    }

    /* Banner documento scaduto */
    .alert-danger {
      background: #dc3545;
      color: white;
      padding: 10px;
      border-radius: 6px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container my-4">
    <h1 class="text-center">Scanner Check-in</h1>

    <div id="session-setup" class="mb-3 text-center">
      <p class="text-muted">📷 Scansiona il QR code della sessione per iniziare</p>
    </div>

    <button id="clear-session-btn" class="btn btn-outline-danger w-100 mb-3 d-none" onclick="cancellaSessione()">Elimina sessione</button>

    <!-- Lettore QR code -->
    <div id="reader-wrapper">
      <div id="reader"></div>
    </div>

    <!-- Stato corrente -->
    <div id="status" class="text-center text-info">📷 In attesa di scansione...</div>

    <!-- Card con dati candidato -->
    <div id="candidate-card" class="card mt-3">
      <div class="card-body">
        <div id="candidate-info"></div>
      </div>
    </div>

    <!-- Pulsanti -->
    <div class="mt-3">
      <button id="confirm-btn" class="btn btn-success w-100 btn-lg d-none" onclick="confermaCheckin()">Conferma Check-in</button>
      <button id="reset-btn" class="btn btn-secondary w-100 btn-lg d-none" onclick="resetScanner()">Nuovo Check-in</button>
    </div>
  </div>

  <script>
    let html5QrCode;
    let scanning = false;
    let ultimoCandidato = null;
    let initialSessionId = "{{ session_id or '' }}";
    let initialRegToken = "{{ reg_token or '' }}";
    let heartbeatId = null;
    const HEARTBEAT_MS = 30000;

    function getDeviceToken() {
      return localStorage.getItem("device_token");
    }

    function setDeviceToken(token) {
      if (token) {
        localStorage.setItem("device_token", token);
      }
    }

    function getUrlParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function parseQrPayload(decodedText) {
      try {
        const url = new URL(decodedText);
        const sessionId = url.searchParams.get("session_id");
        const token = url.searchParams.get("token");
        if (sessionId && token) {
          return { session_id: sessionId, token };
        }
      } catch (e) {
        // Not a URL, continue with JSON.
      }
      try {
        const parsed = JSON.parse(decodedText);
        if (parsed.session_id && parsed.token) {
          return { session_id: parsed.session_id, token: parsed.token };
        }
        if (parsed.session_id) {
          return { session_id: parsed.session_id };
        }
      } catch (e) {
        return null;
      }
      return null;
    }

    function scannerSessione() {
      const reader = new Html5Qrcode("reader");
      Html5Qrcode.getCameras().then(devices => {
        if (devices.length) {
          reader.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 250 },
            (decodedText) => {
              const payload = parseQrPayload(decodedText);
              if (!payload || !payload.session_id) {
                document.getElementById("status").textContent = "QR code non valido.";
                return;
              }

              const session_id = payload.session_id;
              const reg_token = payload.token || null;
              document.getElementById("status").textContent = `Session ID: ${session_id}. Verifica in corso...`;

              reader.stop().then(() => {
                localStorage.setItem("session_id", session_id);
                verificaSessione(session_id, reg_token);
              });
            }
          ).catch(err => {
            document.getElementById("status").textContent = "Errore scanner sessione: " + err;
          });
        } else {
          document.getElementById("status").textContent = "Nessuna fotocamera trovata.";
        }
      });
    }

async function verificaSessione(session_id, reg_token) {
  try {
    const now = new Date();
    const localISO = now.toISOString().slice(0, 16);
    console.log("Verifica sessione con:", session_id, localISO);

    const res = await fetch(`/session-check?session_id=${session_id}&timestamp=${encodeURIComponent(localISO)}`);
    const data = await res.json();
    console.log("Risposta session-check:", data);
if (data.success) {
  document.getElementById("status").textContent = `✅ Sessione valida: ${session_id}`;
  document.getElementById("session-setup").style.display = "none";
  document.getElementById("clear-session-btn").classList.remove("d-none");

  if (reg_token) {
    await registraDispositivo(session_id, reg_token);
  }
  notifyDispositivi(session_id);
  startScanner();
}
 else {
      document.getElementById("status").textContent = `❌ ${data.message}`;
    }
  } catch (err) {
    console.error("Errore fetch /session-check:", err);
    document.getElementById("status").textContent = "Errore nella verifica della sessione.";
  }
}


    function cancellaSessione() {
      const sessionId = localStorage.getItem("session_id");
      const deviceToken = getDeviceToken();
      if (sessionId && deviceToken) {
        disconnectDevice(sessionId, deviceToken);
      }
      stopHeartbeat();
      localStorage.removeItem("device_token");
      localStorage.removeItem("session_id");
      initialSessionId = "";
      initialRegToken = "";
      resetUiForSessionScan();
      scannerSessione();
    }

    function resetScanner() {
      if (html5QrCode) {
        html5QrCode.stop().then(startScanner).catch(console.error);
      }
      document.getElementById("status").textContent = "📷 Scansiona un QR code...";
      document.getElementById("reader-wrapper").style.display = "block";
      document.getElementById("candidate-card").style.display = "none";
      document.getElementById("candidate-info").innerHTML = "";
      document.getElementById("confirm-btn").classList.add("d-none");
      document.getElementById("reset-btn").classList.add("d-none");
      scanning = true;
      ultimoCandidato = null;
    }

    function resetUiForSessionScan() {
      document.getElementById("status").textContent = "📷 Scansiona un QR code...";
      document.getElementById("reader-wrapper").style.display = "block";
      document.getElementById("candidate-card").style.display = "none";
      document.getElementById("candidate-info").innerHTML = "";
      document.getElementById("confirm-btn").classList.add("d-none");
      document.getElementById("reset-btn").classList.add("d-none");
      document.getElementById("session-setup").style.display = "block";
      document.getElementById("clear-session-btn").classList.add("d-none");
      scanning = false;
      ultimoCandidato = null;
    }

    async function registraDispositivo(session_id, reg_token) {
      const userAgent = navigator.userAgent;
      let ip = null;
      try {
        const ipRes = await fetch("https://api.ipify.org?format=json");
        const ipData = await ipRes.json();
        ip = ipData.ip;
      } catch (err) {
        console.warn("Errore lettura IP pubblico:", err);
      }

      try {
        const res = await fetch("/api/dispositivo/registrazione", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            ip_address: ip,
            user_agent: userAgent,
            session_id: session_id,
            token: reg_token
          })
        });
        const data = await res.json();
        if (data && data.success && data.device_token) {
          setDeviceToken(data.device_token);
          console.log("Dispositivo registrato.");
          startHeartbeat(session_id);
        } else {
          document.getElementById("status").textContent = "Errore registrazione dispositivo.";
        }
      } catch (err) {
        console.warn("Errore registrazione dispositivo:", err);
        document.getElementById("status").textContent = "Errore registrazione dispositivo.";
      }
    }

    function startHeartbeat(session_id) {
      const deviceToken = getDeviceToken();
      if (!deviceToken) return;
      stopHeartbeat();
      heartbeatId = setInterval(() => {
        pingDevice(session_id, deviceToken);
      }, HEARTBEAT_MS);
      pingDevice(session_id, deviceToken);
    }

    function stopHeartbeat() {
      if (heartbeatId) {
        clearInterval(heartbeatId);
        heartbeatId = null;
      }
    }

    async function pingDevice(session_id, device_token) {
      try {
        await fetch("/api/dispositivo/ping", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id, device_token })
        });
      } catch (err) {
        // ignore ping errors
      }
    }

    function disconnectDevice(session_id, device_token) {
      try {
        if (navigator.sendBeacon) {
          const blob = new Blob(
            [JSON.stringify({ session_id, device_token })],
            { type: "application/json" }
          );
          navigator.sendBeacon("/api/dispositivo/disconnetti", blob);
          return;
        }
      } catch (err) {
        // ignore and fallback
      }
      fetch("/api/dispositivo/disconnetti", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id, device_token })
      }).catch(() => {});
    }

    async function notifyDispositivi(session_id) {
      try {
        const res = await fetch(`/sessione/${session_id}/verifica_dispositivi`, {
          method: "POST"
        });
        if (res.ok) {
          await res.json();
        }
      } catch (err) {
        // Ignore when not authenticated.
      }
    }

    function startScanner() {
      html5QrCode = new Html5Qrcode("reader");
      Html5Qrcode.getCameras().then(devices => {
        if (devices && devices.length) {
          html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 250 },
            onScanSuccess
          ).catch(err => {
            document.getElementById("status").textContent = "Errore avvio scanner: " + err;
          });
        } else {
          document.getElementById("status").textContent = "Nessuna fotocamera trovata.";
        }
      }).catch(err => {
        document.getElementById("status").textContent = "Errore accesso fotocamera.";
      });
      scanning = true;
    }

    function onScanSuccess(decodedText) {
      if (!scanning) return;
      scanning = false;

      const session_id = localStorage.getItem("session_id");
      let parsed;
      try {
        parsed = JSON.parse(decodedText);
      } catch (e) {
        document.getElementById("status").textContent = "QR non valido.";
        return;
      }

      const uid = parsed.uid;
      console.log("Decoded:", decodedText);
      console.log("Parsed:", parsed);
      console.log("session_id:", session_id);
      if (!session_id || !uid) {
        document.getElementById("status").textContent = "Errore: sessione o QR non validi.";
        return;
      }

      const device_token = getDeviceToken();
      if (!device_token) {
        document.getElementById("status").textContent = "Dispositivo non registrato.";
        document.getElementById("reset-btn").classList.remove("d-none");
        return;
      }

      fetch("/verifica-candidato", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ uid, session_id, device_token })
      })
        .then(res => res.json())
        .then(data => {
          console.log("verifica-candidato response:", data);
          if (!data.success) {
            document.getElementById("status").textContent = "❌ " + data.message;
            document.getElementById("reset-btn").classList.remove("d-none");
            return;
          }

          ultimoCandidato = { uid, session_id };
          document.getElementById("status").textContent = "✅ Candidato trovato. Conferma il check-in.";
          document.getElementById("reader-wrapper").style.display = "none";
          document.getElementById("candidate-card").style.display = "block";
          const documentoScaduto = !!data.candidato.documento_scaduto;
          document.getElementById("candidate-info").innerHTML = `
            <p><strong>Nome:</strong> ${data.candidato.nome}</p>
            <p><strong>Cognome:</strong> ${data.candidato.cognome}</p>
            <p><strong>Numero documento:</strong> ${data.candidato.numero_documento}</p>
            ${documentoScaduto ? '<div class="alert-danger">Documento scaduto</div>' : ''}
          `;
          document.getElementById("confirm-btn").classList.remove("d-none");
          document.getElementById("reset-btn").classList.remove("d-none");
        })
        .catch(err => {
          document.getElementById("status").textContent = "Errore durante la verifica del QR.";
        });
    }

    function confermaCheckin() {
      if (!ultimoCandidato) return;

      const device_token = getDeviceToken();
      if (!device_token) {
        document.getElementById("status").textContent = "Dispositivo non registrato.";
        return;
      }

      fetch("/checkin-candidato", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          uid: ultimoCandidato.uid,
          session_id: ultimoCandidato.session_id,
          device_token
        })
      })
        .then(res => res.json())
        .then(data => {
          document.getElementById("status").textContent = data.success ? "✅ Check-in registrato!" : "❌ " + data.message;
          document.getElementById("confirm-btn").classList.add("d-none");
        })
        .catch(err => {
          document.getElementById("status").textContent = "Errore durante la registrazione del check-in.";
        });
    }

    window.addEventListener("load", () => {
      const storedSession = localStorage.getItem("session_id");
      const sessionIdFromQuery = initialSessionId || getUrlParam("session_id");
      const tokenFromQuery = initialRegToken || getUrlParam("token");

      if (sessionIdFromQuery && tokenFromQuery) {
        localStorage.setItem("session_id", sessionIdFromQuery);
        document.getElementById("clear-session-btn").classList.remove("d-none");
        verificaSessione(sessionIdFromQuery, tokenFromQuery);
        return;
      }

      if (storedSession) {
        document.getElementById("clear-session-btn").classList.remove("d-none");
        verificaSessione(storedSession, null);
        startHeartbeat(storedSession);
      } else {
        scannerSessione();
      }
    });

    window.addEventListener("beforeunload", () => {
      const sessionId = localStorage.getItem("session_id");
      const deviceToken = getDeviceToken();
      if (sessionId && deviceToken) {
        disconnectDevice(sessionId, deviceToken);
      }
    });
  </script>
</body>
</html>
