<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Gestione Concorso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.6.1/dist/css/bootstrap-italia.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.6.1/dist/js/bootstrap-italia.bundle.min.js" defer></script>
  <script src="https://unpkg.com/htmx.org@1.9.2"></script>

  <style>
    body {
      background-color: #f5f6f8;
    }
    .sidebar-wrapper {
      background-color: white;
      min-height: 100vh;
      border-right: 1px solid #e0e0e0;
    }
    .content-area {
      background-color: #f5f6f8;
      min-height: 100vh;
      padding: 2rem;
    }
    .it-card{
      background-color: white;
    }

#timeline-container {
  overflow-y: auto;
  position: relative; 
}
.exam-timeline .timeline-step {
  position: relative;
  padding-left: 0;
  margin-bottom: 1.5rem;
  border-left: none;
}

.timeline-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  display: inline-block;
}

/* Allinea 'Step X' tutto a destra */
.step-label {
  white-space: nowrap;
  margin-left: auto;
}

  .overlay {
    position: fixed; inset: 0; z-index: 2000;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,.75);
    pointer-events: auto; /* cattura i click */
  }
  #global-overlay { display: none; }
  #global-overlay.htmx-request { display: flex !important; }
  .overlay-content { max-width: 90vw; }
  .no-scroll { overflow: hidden; }


  </style>
</head>
<body>

{% include 'header.html' %}

<div class="container-fluid">
  <div class="row">
    <!-- Sidebar Bootstrap Italia -->
          {% include "sidebar.html" %}


    
    <!-- Main content -->
    <main class="col-md-10 content-area">
    <!-- wrapper azioni -->

    <div 
        hx-get="/sessione/{{ sessione.session_id }}/azioni-frammento" 
        hx-trigger="load, azioniAggiornate:{{ sessione.session_id }} from:body"
        hx-swap="innerHTML">
    </div>

    <div
        hx-get="/sessione/{{ sessione.session_id }}/notifiche-frammento"
        hx-trigger="load, every 10s[document.getElementById('timeline-log') && document.getElementById('timeline-log').getAttribute('data-auto-refresh') === 'true']"
        hx-swap="innerHTML"
        data-auto-refresh="true"
        style="display:none"
        id="timeline-log">
      <div class="text-muted">Caricamento chat…</div>
    </div>

    <div
        hx-get="/sessione/{{ sessione.session_id }}/notifiche-frammento"
        hx-trigger="load, every 10s"
        hx-swap="innerHTML"
        style="display:none">
      <div class="text-muted">Caricamento notifiche…</div>
    </div>




    <div class="it-card-wrapper">
      <div class="it-card rounded shadow-sm p-4">

        <!-- Messaggi -->
        {% if messaggi %}
          <div class="alert alert-danger">
            {% for msg in messaggi %}
              <p>{{ msg }}</p>
            {% endfor %}
          </div>
        {% endif %}
        <div id="htmx-alert" class="d-none" role="alert"></div>

      <!-- Tabella candidati dinamica -->
      {% if sessione %}
            <button
              class="btn btn-outline-primary btn-sm"
              hx-get="/sessione/{{ sessione.session_id }}/tabella_candidati"
              hx-target="#tabella-candidati"
              hx-swap="innerHTML">
              Aggiorna
            </button>
      <form id="filtri-candidati"
      class="row g-2 mb-3"
      hx-get="/sessione/{{ sessione.session_id }}/tabella_candidati"
      hx-target="#tabella-candidati"
      hx-swap="innerHTML"
      hx-trigger="load, change, keyup delay:300ms from:#search, candidatiScaricati from:body, candidatiAggiornati from:body">

  <div class="col-md-4">
    <input id="search" name="q" class="form-control"
           placeholder="Cerca nome, cognome o documento"
           value="{{ q or '' }}">
  </div>

  <div class="col-md-3">
    <select name="sort" class="form-select">
      <option value="alpha"      {{ 'selected' if sort=='alpha'      else '' }}>Ordina A→Z (Cognome)</option>
      <option value="checkin_no" {{ 'selected' if sort=='checkin_no' else '' }}>Prima non effettuati</option>
      <option value="checkin_yes"{{ 'selected' if sort=='checkin_yes' else '' }}>Prima effettuati</option>
    </select>
  </div>

  <div class="col-md-3">
    <select name="checkin" class="form-select">
      <option value="all" {{ 'selected' if checkin=='all' else '' }}>Tutti i check-in</option>
      <option value="yes" {{ 'selected' if checkin=='yes' else '' }}>Solo effettuati</option>
      <option value="no"  {{ 'selected' if checkin=='no'  else '' }}>Solo non effettuati</option>
    </select>
  </div>

  <div class="col-md-2 d-flex align-items-center">
    <div class="form-check">
      <input class="form-check-input" type="checkbox"
             id="expired_only" name="expired_only" value="1"
             {% if expired_only %}checked{% endif %}>
      <label class="form-check-label" for="expired_only">Documento scaduto</label>
    </div>
  </div>
</form>

<!-- Il DIV è SOLO target, non fa richieste -->
<div id="tabella-candidati"></div>

      {% endif %}


      </div>
    </div>

    </main>
  </div>
</div>

<!-- Script -->
<script>

(function () {
  document.body.addEventListener('htmx:afterRequest', function (evt) {
    if (evt.detail && evt.detail.successful) {
      const alertBox = document.getElementById('htmx-alert');
      if (alertBox) {
        alertBox.classList.add('d-none');
        alertBox.innerHTML = "";
      }
    }
  });

  document.body.addEventListener('htmx:responseError', function (evt) {
    const xhr = evt.detail && evt.detail.xhr ? evt.detail.xhr : null;
    if (!xhr) return;
    if (xhr.status === 403) {
      const alertBox = document.getElementById('htmx-alert');
      if (alertBox) {
        alertBox.innerHTML = xhr.responseText || "Operazione non consentita.";
        alertBox.classList.remove('d-none');
      }
    }
  });
})();

function ricaricaPaginaUnaSolaVolta(sessionId) {
  const key = "pagina_ricaricata_" + sessionId;

  if (!sessionStorage.getItem(key)) {
    sessionStorage.setItem(key, "true");
    location.reload();
  } else {
    sessionStorage.removeItem(key);
  }
}


addEventListener("pageshow", () => {
  const sessionId = "{{ sessione.session_id }}"; 
  ricaricaPaginaUnaSolaVolta(sessionId);
});



  document.body.addEventListener('htmx:targetError', function (evt) {
    alert("Errore: non è stato possibile aggiornare l'interfaccia. Ricarica la pagina.");
    console.error("HTMX Target Error", evt);
  });


 // autoscroll timeline

  document.body.addEventListener("htmx:afterSwap", function (evt) {
    if (evt.target.id === "timeline-wrapper") {
      console.log(" 1dentro scroll");
      const currentStep = document.getElementById("current-step");
      const container = document.getElementById("timeline-container");

      if (currentStep && container) {
        console.log(" 2dentro scroll");
        // Scroll automatico fluido centrato sul current step
        currentStep.scrollIntoView({
          behavior: "smooth",
          block: "center"
        });
      }
    }
  });






</script>


          {% include "footer.html" %}

          <!-- Overlay globale blocca-schermata -->
<div id="global-overlay" class="overlay" aria-hidden="true">
  <div class="overlay-content text-center" role="status" aria-live="polite" aria-busy="true">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">Caricamento…</span>
    </div>
    <p class="mt-3 mb-0">Operazione in corso… non chiudere la pagina.</p>
  </div>
</div>

</body>
</html>
