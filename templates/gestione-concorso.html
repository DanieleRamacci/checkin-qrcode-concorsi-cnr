<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Gestione Concorso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.6.1/dist/css/bootstrap-italia.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.6.1/dist/js/bootstrap-italia.bundle.min.js" defer></script>
  <script src="https://unpkg.com/htmx.org@1.9.2"></script>

  <style>
    body {
      background-color: #f5f6f8;
    }
    .sidebar-wrapper {
      background-color: white;
      min-height: 100vh;
      border-right: 1px solid #e0e0e0;
    }
    .content-area {
      background-color: #f5f6f8;
      min-height: 100vh;
      padding: 2rem;
    }
    .it-card{
      background-color: white;
    }

#timeline-container {
  overflow-y: auto;
  position: relative; 
}
.exam-timeline .timeline-step {
  position: relative;
  padding-left: 0;
  margin-bottom: 1.5rem;
  border-left: none;
}

.timeline-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  display: inline-block;
}

/* Allinea 'Step X' tutto a destra */
.step-label {
  white-space: nowrap;
  margin-left: auto;
}

  .overlay {
    position: fixed; inset: 0; z-index: 2000;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,.75);
    pointer-events: auto; /* cattura i click */
  }
  .overlay.d-none { display: none !important; }
  .overlay-content { max-width: 90vw; }
  .no-scroll { overflow: hidden; }


  </style>
</head>
<body>

{% include 'header.html' %}

<div class="container-fluid">
  <div class="row">
    <!-- Sidebar Bootstrap Italia -->
          {% include "sidebar.html" %}


    
    <!-- Main content -->
    <main class="col-md-10 content-area">
    <!-- wrapper azioni -->

    <div 
        hx-get="/sessione/{{ sessione.session_id }}/azioni-frammento" 
        hx-trigger="load, azioniAggiornate from:body"
        hx-swap="innerHTML">
    </div>



    <div class="it-card-wrapper">
      <div class="it-card rounded shadow-sm p-4">

        <!-- Messaggi -->
        {% if messaggi %}
          <div class="alert alert-danger">
            {% for msg in messaggi %}
              <p>{{ msg }}</p>
            {% endfor %}
          </div>
        {% endif %}

      <!-- Tabella candidati dinamica -->
      {% if sessione %}
            <button
              class="btn btn-outline-primary btn-sm"
              hx-get="/sessione/{{ sessione.session_id }}/tabella_candidati"
              hx-target="#tabella-candidati"
              hx-swap="innerHTML">
              Aggiorna
            </button>
        <div id="tabella-candidati"
            hx-get="/sessione/{{ sessione.session_id }}/tabella_candidati"
            hx-trigger="load, candidatiScaricati from:body"
            hx-swap="innerHTML">
          <!-- HTMX caricherà qui il frammento -->
        </div>
      {% endif %}


      </div>
    </div>

    </main>
  </div>
</div>

<!-- Script -->
<script>

(function () {
  let inFlight = 0;

  function showOverlay() {
    const ov = document.getElementById('global-overlay');
    if (!ov) return;
    ov.classList.remove('d-none');
    ov.setAttribute('aria-hidden', 'false');
    document.body.classList.add('no-scroll');
  }
  function hideOverlay() {
    const ov = document.getElementById('global-overlay');
    if (!ov) return;
    ov.classList.add('d-none');
    ov.setAttribute('aria-hidden', 'true');
    document.body.classList.remove('no-scroll');
  }

  window.addEventListener('beforeunload', function (e) {
    if (inFlight > 0) { e.preventDefault(); e.returnValue = ''; }
  });

  // ✅ usa evt.detail.elt
  document.body.addEventListener('htmx:beforeRequest', function (evt) {
    const elt = evt.detail && evt.detail.elt ? evt.detail.elt : null;
    if (elt && elt.closest('[data-block-ui]')) {
      inFlight++;
      showOverlay();
    }
  });

  document.body.addEventListener('htmx:afterRequest', function () {
    if (inFlight > 0) inFlight--;
    if (inFlight === 0) hideOverlay();
  });

  document.body.addEventListener('htmx:responseError', function () {
    if (inFlight > 0) inFlight--;
    if (inFlight === 0) hideOverlay();
  });
})();

function ricaricaPaginaUnaSolaVolta(sessionId) {
  const key = "pagina_ricaricata_" + sessionId;

  if (!sessionStorage.getItem(key)) {
    sessionStorage.setItem(key, "true");
    location.reload();
  } else {
    sessionStorage.removeItem(key);
  }
}


addEventListener("pageshow", () => {
  const sessionId = "{{ sessione.session_id }}"; 
  ricaricaPaginaUnaSolaVolta(sessionId);
});



  document.body.addEventListener('htmx:targetError', function (evt) {
    alert("Errore: non è stato possibile aggiornare l'interfaccia. Ricarica la pagina.");
    console.error("HTMX Target Error", evt);
  });


 // autoscroll timeline

  document.body.addEventListener("htmx:afterSwap", function (evt) {
    if (evt.target.id === "timeline-wrapper") {
      console.log(" 1dentro scroll");
      const currentStep = document.getElementById("current-step");
      const container = document.getElementById("timeline-container");

      if (currentStep && container) {
        console.log(" 2dentro scroll");
        // Scroll automatico fluido centrato sul current step
        currentStep.scrollIntoView({
          behavior: "smooth",
          block: "center"
        });
      }
    }
  });






</script>


          {% include "footer.html" %}

          <!-- Overlay globale blocca-schermata -->
<div id="global-overlay" class="overlay d-none" aria-hidden="true">
  <div class="overlay-content text-center" role="status" aria-live="polite" aria-busy="true">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">Caricamento…</span>
    </div>
    <p class="mt-3 mb-0">Operazione in corso… non chiudere la pagina.</p>
  </div>
</div>

</body>
</html>
