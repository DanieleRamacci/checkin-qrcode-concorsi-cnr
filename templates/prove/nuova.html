<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nuovo Concorso - Modulo Prove</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.6.1/dist/css/bootstrap-italia.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.6.1/dist/js/bootstrap-italia.bundle.min.js" defer></script>
  <style>body{font-size:.92rem}</style>
</head>
<body>
  {% include 'header.html' %}

  <div class="container-fluid px-4 my-4">
    <div class="row g-3">
      <div class="col-12">
        <h2 class="h5 mb-3">Aggiungi nuovo concorso</h2>
        {% if request.args.get('err') %}
          <div class="alert alert-danger py-2">{{ request.args.get('err') }}</div>
        {% endif %}
        <form method="POST" action="/prove/nuova" class="border rounded p-3 bg-light">
          <div class="row g-2">
            <div class="col-md-3">
              <label class="form-label">Numero bando</label>
              <input class="form-control form-control-sm" name="numero_bando">
            </div>
            <div class="col-md-5">
              <label class="form-label">Titolo</label>
              <input class="form-control form-control-sm" name="titolo">
            </div>
            <div class="col-md-2">
              <label class="form-label">Data prova</label>
              <input type="date" class="form-control form-control-sm" name="data_prova">
            </div>
            <div class="col-md-2">
              <label class="form-label">Ora prova</label>
              <input type="time" class="form-control form-control-sm" name="ora_prova">
            </div>
            <div class="col-md-2">
              <label class="form-label">Data convocazione test piattaforma</label>
              <input type="date" class="form-control form-control-sm" name="data_convocazione_test_piattaforma">
            </div>
            <div class="col-md-4">
              <label class="form-label">Luogo</label>
              <input class="form-control form-control-sm" name="luogo">
            </div>
            <div class="col-md-3">
              <label class="form-label">Tipologia prova esame</label>
              <select class="form-select form-select-sm" name="tipologia_prova_esame">
                <option value="">-- seleziona --</option>
                <option value="risposta_multipla">Risposte multiple</option>
                <option value="risposta_aperta">Risposte aperte</option>
              </select>
            </div>
            <div class="col-md-9">
              <label class="form-label">Note tipologia prova</label>
              <input class="form-control form-control-sm" name="note_tipologia_prova" placeholder="Dettagli aggiuntivi sulla tipologia della prova">
            </div>
            <div class="col-md-6">
              <label class="form-label">Esperto assegnato</label>
              {% if is_admin %}
              <select class="form-select form-select-sm" name="esperto_email">
                <option value="">-- nessun esperto assegnato --</option>
                {% for e in esperti_options %}
                  <option value="{{ e }}" {% if e == user_email %}selected{% endif %}>{{ e }}</option>
                {% endfor %}
              </select>
              {% else %}
              <select class="form-select form-select-sm" name="esperto_email">
                <option value="">-- nessun esperto assegnato --</option>
                <option value="{{ user_email }}" selected>{{ user_email }}</option>
              </select>
              <small class="text-muted">Puoi lasciare non assegnato o assegnare solo te stesso.</small>
              {% endif %}
            </div>
            <div class="col-md-6">
              <label class="form-label">Referente nome</label>
              <input class="form-control form-control-sm" name="referente_nome">
            </div>
            <div class="col-md-6">
              <label class="form-label">Referente email</label>
              <input type="email" class="form-control form-control-sm" name="referente_email">
            </div>
            <div class="col-md-6">
              <label class="form-label">Segretario nome</label>
              <input class="form-control form-control-sm" name="segretario_nome">
            </div>
            <div class="col-md-6">
              <label class="form-label">Segretario email</label>
              <input type="email" class="form-control form-control-sm" name="segretario_email">
            </div>
          </div>

          <div class="mt-3 d-flex gap-2">
            <button class="btn btn-primary btn-sm" type="submit">Crea concorso</button>
            <a class="btn btn-outline-secondary btn-sm" href="/prove/tutti">Annulla</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
