{% set section = active_section if active_section is defined else None %}
<div class="card shadow-sm mb-3">
  <div class="card-body py-2 px-3">
    <div class="d-flex flex-wrap gap-2 align-items-center">
      <a class="btn btn-sm {% if request.path == '/' %}btn-primary{% else %}btn-outline-primary{% endif %}" href="/">Home</a>
      <a class="btn btn-sm {% if request.path == '/prove/tutti' %}btn-primary{% else %}btn-outline-primary{% endif %}" href="/prove/tutti">Tutte le prove</a>
      <a class="btn btn-sm {% if request.path == '/prove/miei' %}btn-primary{% else %}btn-outline-primary{% endif %}" href="/prove/miei">Le mie prove</a>
      {% if prova is defined %}
      <span class="text-muted small ms-1">|</span>
      <a class="btn btn-sm {% if section == 'workflow' %}btn-primary{% else %}btn-outline-secondary{% endif %}" href="{{ url_for('prove.prove_dettaglio', prove_id=prova.prove_id, section='workflow') }}">Stati e azioni</a>
      <a class="btn btn-sm {% if section == 'dati' %}btn-primary{% else %}btn-outline-secondary{% endif %}" href="{{ url_for('prove.prove_dettaglio', prove_id=prova.prove_id, section='dati') }}">Dati</a>
      <a class="btn btn-sm {% if section == 'documenti' %}btn-primary{% else %}btn-outline-secondary{% endif %}" href="{{ url_for('prove.prove_dettaglio', prove_id=prova.prove_id, section='documenti') }}">Documenti</a>
      <a class="btn btn-sm {% if section == 'buste' %}btn-primary{% else %}btn-outline-secondary{% endif %}" href="{{ url_for('prove.prove_dettaglio', prove_id=prova.prove_id, section='buste') }}">Buste</a>
      <a class="btn btn-sm {% if section == 'email' %}btn-primary{% else %}btn-outline-secondary{% endif %}" href="{{ url_for('prove.prove_dettaglio', prove_id=prova.prove_id, section='email') }}">Email</a>
      {% endif %}
    </div>
  </div>
</div>
