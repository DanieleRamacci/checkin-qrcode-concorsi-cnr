<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Gestione Permessi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.6.1/dist/css/bootstrap-italia.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.6.1/dist/js/bootstrap-italia.bundle.min.js" defer></script>
</head>
<body>
  {% include 'header.html' %}

  <div class="container my-5">
    <h1 class="mb-4">Gestione permessi</h1>

    <form method="post" class="row g-2 align-items-end mb-4">
      <div class="col-md-5">
        <label for="user_email" class="form-label">Email utente</label>
        <input id="user_email" name="user_email" type="email" class="form-control" placeholder="nome.cognome@cnr.it" required>
      </div>
      <div class="col-md-4">
        <label for="role" class="form-label">Ruolo</label>
        <select id="role" name="role" class="form-select" required>
          {% for r in allowed_roles %}
            <option value="{{ r }}">{{ r }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-3">
        <button class="btn btn-primary w-100" type="submit">Aggiungi</button>
      </div>
    </form>

    <div class="table-responsive">
      <table class="table table-striped table-hover">
        <thead class="table-light">
          <tr>
            <th>Email</th>
            <th>Ruolo</th>
            <th>Creato da</th>
            <th>Creato il</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          {% for r in ruoli %}
            <tr>
              <td>{{ r.user_email }}</td>
              <td>{{ r.role }}</td>
              <td>{{ r.created_by or '-' }}</td>
              <td>{{ r.created_at }}</td>
              <td class="text-end">
                <form method="post" action="/admin/permessi/remove">
                  <input type="hidden" name="user_email" value="{{ r.user_email }}">
                  <input type="hidden" name="role" value="{{ r.role }}">
                  <button class="btn btn-sm btn-outline-danger" type="submit">Rimuovi</button>
                </form>
              </td>
            </tr>
          {% else %}
            <tr>
              <td colspan="5">Nessun ruolo assegnato.</td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
