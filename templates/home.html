<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Selezione Profilo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.6.1/dist/css/bootstrap-italia.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.6.1/dist/js/bootstrap-italia.bundle.min.js" defer></script>
</head>

<body>
  {% include 'header.html' %}

  <div class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="mb-0">Seleziona il profilo</h1>
      {% if is_admin %}
        <div class="dropdown">
          <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
            Menu admin
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="/admin/permessi">Gestione permessi</a></li>
            <li><a class="dropdown-item" href="/admin/logs">Log sistema</a></li>
          </ul>
        </div>
      {% endif %}
    </div>
    <p class="text-muted">Scegli il flusso di lavoro per continuare.</p>

    <div class="row g-3">
      <div class="col-md-4">
        <div class="card h-100 shadow-sm">
          <div class="card-body">
            <h5 class="card-title">Segretario</h5>
            <p class="card-text">Gestione concorsi e sessioni fino alle liste inviate.</p>
            <a href="/dashboard/segretario" class="btn btn-primary">Entra come Segretario</a>
          </div>
        </div>
      </div>
    </div>
  </div>

{% include "footer.html" %}
</body>
</html>
