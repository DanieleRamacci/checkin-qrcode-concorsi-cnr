<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Gestione Sessione - Informatico in Sede</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.6.1/dist/css/bootstrap-italia.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.6.1/dist/js/bootstrap-italia.bundle.min.js" defer></script>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <style>
    body {
      background-color: #f5f6f8;
    }
    .sidebar-wrapper {
      background-color: #ffffff;
      min-height: 100vh;
      border-right: 1px solid #e6e6e6;
      padding: 1.5rem 1rem;
    }
    .content-area {
      background-color: #f5f6f8;
      min-height: 100vh;
      padding: 1.5rem 1.5rem;
    }
    .right-rail {
      background-color: #f5f6f8;
      min-height: 100vh;
      padding: 1.5rem 1rem;
      border-left: 1px solid #e6e6e6;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
    }
    .exam-timeline .timeline-step {
      position: relative;
      padding-left: 0;
      margin-bottom: 1.5rem;
      border-left: none;
    }
    .timeline-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
    }
    .step-label {
      white-space: nowrap;
      margin-left: auto;
    }
    .chat-card {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 240px);
    }
    .chat-messages {
      overflow-y: auto;
      flex: 1 1 auto;
      padding-right: 0.25rem;
    }
    .chat-input {
      margin-top: auto !important;
      background: #fff;
      position: sticky;
      bottom: 0;
      padding-top: 0.5rem;
    }
    .overlay {
      position: fixed; inset: 0; z-index: 2000;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,.75);
      pointer-events: auto;
    }
    .overlay-content { max-width: 90vw; }
    #global-overlay { display: none; }
    #global-overlay.htmx-request { display: flex !important; }
  </style>
</head>
<body>
  {% include 'header.html' %}

  <div class="container-fluid">
    <div class="row">
      <aside class="col-md-2 sidebar-wrapper">
        {% include "sidebar_sede.html" %}
      </aside>

      <div class="col-md-10 content-area">
        <div class="row g-3">
          <main class="col-md-8">
            <div id="azioni-wrapper"
                 hx-get="/sessione/{{ sessione.session_id }}/azioni-frammento?view=sede"
                 hx-trigger="load, azioniAggiornate:{{ sessione.session_id }} from:body"
                 hx-swap="innerHTML">
              <div class="text-muted">Caricamento azioni e stati…</div>
            </div>

            <div class="mt-3"
                 hx-get="/sessione/{{ sessione.session_id }}/reset-password-frammento?view=sede"
                 hx-trigger="load"
                 hx-swap="innerHTML">
              <div class="text-muted">Caricamento reset password…</div>
            </div>
          </main>
          <aside class="col-md-4 right-rail">
            <div id="timeline-log"
              hx-get="/sessione/{{ sessione.session_id }}/notifiche-frammento"
              hx-trigger="load, every 10s[document.getElementById('timeline-log') && document.getElementById('timeline-log').getAttribute('data-auto-refresh') === 'true']"
              hx-swap="innerHTML"
              data-auto-refresh="true">
              <div class="text-muted">Caricamento stato e chat…</div>
            </div>
          </aside>
        </div>
      </div>
    </div>
  </div>

  <div id="global-overlay" class="overlay" aria-hidden="true">
    <div class="overlay-content text-center" role="status" aria-live="polite" aria-busy="true">
      <div class="spinner-border" role="status">
        <span class="visually-hidden">Caricamento…</span>
      </div>
      <p class="mt-3 mb-0">Operazione in corso… non chiudere la pagina.</p>
    </div>
  </div>

  <script>
    document.addEventListener("htmx:afterSwap", function (evt) {
      if (evt.target && evt.target.id === "timeline-log") {
        const input = evt.target.querySelector("input[name='message']");
        if (input && input.value) {
          evt.target.setAttribute("data-auto-refresh", "false");
        }
      }
    });

    document.addEventListener("focusin", function (evt) {
      if (evt.target && evt.target.matches("input[name='message']")) {
        const panel = document.getElementById("timeline-log");
        if (panel) panel.setAttribute("data-auto-refresh", "false");
      }
    });

    document.addEventListener("focusout", function (evt) {
      if (evt.target && evt.target.matches("input[name='message']")) {
        const panel = document.getElementById("timeline-log");
        if (panel) panel.setAttribute("data-auto-refresh", "true");
      }
    });
  </script>
</body>
</html>
