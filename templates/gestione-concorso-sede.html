<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Gestione Sessione - Informatico in Sede</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.6.1/dist/css/bootstrap-italia.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.6.1/dist/js/bootstrap-italia.bundle.min.js" defer></script>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <style>
    body {
      background-color: #f5f6f8;
    }
    .sidebar-wrapper {
      background-color: #ffffff;
      min-height: 100vh;
      border-right: 1px solid #e6e6e6;
      padding: 1.5rem 1rem;
    }
    .content-area {
      background-color: #f5f6f8;
      min-height: 100vh;
      padding: 1.5rem 1.5rem;
    }
    .overlay {
      position: fixed; inset: 0; z-index: 2000;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,.75);
      pointer-events: auto;
    }
    .overlay-content { max-width: 90vw; }
    #global-overlay { display: none; }
    #global-overlay.htmx-request { display: flex !important; }
  </style>
</head>
<body>
  {% include 'header.html' %}

  <div class="container-fluid">
    <div class="row">
      <aside class="col-md-2 sidebar-wrapper">
        {% include "sidebar_sede.html" %}
      </aside>

      <div class="col-md-10 content-area">
        <div class="row g-3">
          <main class="col-md-8">
            <div id="azioni-wrapper"
                 hx-get="/sessione/{{ sessione.session_id }}/azioni-frammento?view=sede"
                 hx-trigger="load, azioniAggiornate:{{ sessione.session_id }} from:body"
                 hx-swap="innerHTML">
              <div class="text-muted">Caricamento azioni e stati…</div>
            </div>

            <div class="mt-3"
                 hx-get="/sessione/{{ sessione.session_id }}/reset-password-frammento?view=sede"
                 hx-trigger="load"
                 hx-swap="innerHTML">
              <div class="text-muted">Caricamento reset password…</div>
            </div>
          </main>
          <aside class="col-md-4 right-rail">
            <div id="timeline-log"
              hx-get="/sessione/{{ sessione.session_id }}/notifiche-frammento"
              hx-trigger="load, every 10s[document.getElementById('timeline-log') && document.getElementById('timeline-log').getAttribute('data-auto-refresh') === 'true']"
              hx-swap="innerHTML"
              data-auto-refresh="true">
              <div class="text-muted">Caricamento stato e chat…</div>
            </div>
          </aside>
        </div>
      </div>
    </div>
  </div>

  <div id="global-overlay" class="overlay" aria-hidden="true">
    <div class="overlay-content text-center" role="status" aria-live="polite" aria-busy="true">
      <div class="spinner-border" role="status">
        <span class="visually-hidden">Caricamento…</span>
      </div>
      <p class="mt-3 mb-0">Operazione in corso… non chiudere la pagina.</p>
    </div>
  </div>

  <script></script>
</body>
</html>
