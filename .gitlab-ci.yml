workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "test"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - when: never

stages:
  - test
  - build
  - release

variables:
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_TLS_CERTDIR: ""
  BACKEND_SHA_IMAGE: "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA"
  FRONTEND_SHA_IMAGE: "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA"

backend-test:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install --no-cache-dir -r requirements-dev.txt
  script:
    - python -m pytest -q tests

frontend-test:
  stage: test
  image: node:24-alpine
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run test:ci
    - npm run build:production

build-images:
  stage: build
  image: docker:27-cli
  services:
    - name: docker:27-dind
      alias: docker
  rules:
    - if: '$CI_COMMIT_BRANCH == "test"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
  script:
    - docker build --pull -t "$BACKEND_SHA_IMAGE" .
    - docker build --pull -t "$FRONTEND_SHA_IMAGE" frontend
    - docker push "$BACKEND_SHA_IMAGE"
    - docker push "$FRONTEND_SHA_IMAGE"

release-test:
  stage: release
  image: docker:27-cli
  services:
    - name: docker:27-dind
      alias: docker
  rules:
    - if: '$CI_COMMIT_BRANCH == "test"'
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
  script:
    - docker pull "$BACKEND_SHA_IMAGE"
    - docker pull "$FRONTEND_SHA_IMAGE"
    - docker tag "$BACKEND_SHA_IMAGE" "$CI_REGISTRY_IMAGE/backend:test"
    - docker tag "$FRONTEND_SHA_IMAGE" "$CI_REGISTRY_IMAGE/frontend:test"
    - docker push "$CI_REGISTRY_IMAGE/backend:test"
    - docker push "$CI_REGISTRY_IMAGE/frontend:test"
  environment:
    name: testing
    url: $TEST_ENVIRONMENT_URL

release-production:
  stage: release
  image: docker:27-cli
  services:
    - name: docker:27-dind
      alias: docker
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
  script:
    - docker pull "$BACKEND_SHA_IMAGE"
    - docker pull "$FRONTEND_SHA_IMAGE"
    - docker tag "$BACKEND_SHA_IMAGE" "$CI_REGISTRY_IMAGE/backend:production"
    - docker tag "$FRONTEND_SHA_IMAGE" "$CI_REGISTRY_IMAGE/frontend:production"
    - docker push "$CI_REGISTRY_IMAGE/backend:production"
    - docker push "$CI_REGISTRY_IMAGE/frontend:production"
  environment:
    name: production
    url: $PRODUCTION_ENVIRONMENT_URL
