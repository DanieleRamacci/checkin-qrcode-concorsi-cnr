version: "3.9"
services:
  web:
    build: .
    container_name: checkin-app
    ports:
      - "5050:5050"
    volumes:
      - .:/app
      - ./instance:/app/instance  # Mantiene le sessioni persistenti

    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:


