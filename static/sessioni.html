<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Sessioni del Concorso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.6.1/dist/css/bootstrap-italia.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.6.1/dist/js/bootstrap-italia.bundle.min.js" defer></script>
</head>
<body>

  <div class="container my-5">
    <h1 class="mb-4">Sessioni del Concorso</h1>
    <p class="lead">Elenco delle sessioni collegate al concorso selezionato.</p>

    <div class="table-responsive">
      <table class="table table-striped table-hover">
        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>Nome Sessione</th>
            <th>Luogo</th>
            <th>Data</th>
            <th>Ora</th>
            <th>Azioni</th>
          </tr>
        </thead>
        <tbody id="corpo-tabella-sessioni"></tbody>
      </table>
    </div>
  </div>

  <script>
    async function caricaSessioni() {
      const params = new URLSearchParams(window.location.search);
      const commission_id = params.get('commission_id');

      if (!commission_id) {
        alert("Commission ID mancante nell'URL");
        return;
      }

      try {
        const res = await fetch(`/get-sessioni/${commission_id}`);
        const data = await res.json();

        if (!data.success) {
          alert("Errore nel recupero sessioni: " + (data.message || data.error));
          return;
        }

        const sessioni = data.sessioni;

        const tbody = document.getElementById('corpo-tabella-sessioni');
        tbody.innerHTML = '';

        sessioni.forEach((s, index) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <th scope="row">${index + 1}</th>
            <td>${s.session_string}</td>
            <td>${s.luogo}</td>
            <td>${s.giorno}</td>
            <td>${s.ora}</td>
            <td>
              <a href="/gestione-concorso.html?session_id=${s.session_id}" class="btn btn-sm btn-primary">
                Gestisci
              </a>
            </td>
          `;
          tbody.appendChild(tr);
        });

      } catch (err) {
        console.error('Errore nel caricamento sessioni:', err);
      }
    }

    // Esegui al caricamento della pagina
    window.addEventListener('DOMContentLoaded', caricaSessioni);
  </script>

</body>
</html>
