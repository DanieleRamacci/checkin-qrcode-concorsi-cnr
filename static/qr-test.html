<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Generazione QR Code - Test</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1, h2 {
      text-align: center;
    }

    #qrs {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 50px;
      margin-top: 30px;
    }

    .qr-section {
      text-align: center;
      border: 1px solid #ccc;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      background: #fafafa;
    }

    .qr-box {
      margin: 20px auto;
      width: 400px;
      height: 400px;
      padding: 40px;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    pre {
      background: #f0f0f0;
      padding: 15px;
      max-width: 600px;
      overflow-x: auto;
      text-align: left;
    }
  </style>
</head>
<body>
  <h1>Generazione QR Code da JSON</h1>

  <div id="qrs">
    <div class="qr-section">
      <h2>QR Code Master</h2>
      <div class="qr-box" id="qrcode-master"></div>
      <pre id="json-master"></pre>
    </div>

    <div class="qr-section">
      <h2>QR Code Utente</h2>
      <div class="qr-box" id="qrcode-utente"></div>
      <pre id="json-utente"></pre>
    </div>
  </div>

   <div class="qr-section">
      <h2>QR Code Utente Errore</h2>
      <div class="qr-box" id="qrcode-utente-error"></div>
      <pre id="json-utente-error"></pre>
    </div>
  </div>

  <script>
    async function generaQRCode(jsonPath, elementIdQR, elementIdJSON) {
      try {
        const res = await fetch(jsonPath);
        const data = await res.json();
        document.getElementById(elementIdJSON).textContent = JSON.stringify(data, null, 2);
        new QRCode(document.getElementById(elementIdQR), {
          text: JSON.stringify(data),
          width: 384,
          height: 384,
          correctLevel: QRCode.CorrectLevel.H // migliore qualità
        });
      } catch (err) {
        document.getElementById(elementIdJSON).textContent = "❌ Errore nel caricamento di " + jsonPath;
        console.error(err);
      }
    }

    generaQRCode('/static/qr-code-test/master-qr.json', 'qrcode-master', 'json-master');
    generaQRCode('/static/qr-code-test/utente-qr.json', 'qrcode-utente', 'json-utente');
    generaQRCode('/static/qr-code-test/utente-qr-error.json', 'qrcode-utente-error', 'json-utente-error');
  </script>
</body>
</html>
