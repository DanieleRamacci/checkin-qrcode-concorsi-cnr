<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Dati Utente</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; }
        pre { background: #f0f0f0; padding: 1rem; border-radius: 5px; }
        button { padding: 10px 20px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Dati utente (dal JWT decodificato)</h1>
    <div id="user_info">Caricamento...</div>
    <button onclick="logout()">Logout</button>

    <script>
        fetch('/me')
            .then(res => res.json())
            .then(data => {
                const info = data.user_info || {};
                document.getElementById('user_info').innerHTML = '<pre>' + JSON.stringify(info, null, 2) + '</pre>';
            })
            .catch(err => {
                document.getElementById('user_info').innerText = 'Errore nel recupero dati utente';
                console.error(err);
            });

        function logout() {
            fetch('/logout')
                .then(() => {
                    window.location.href = '/';
                });
        }
    </script>
</body>
</html>
