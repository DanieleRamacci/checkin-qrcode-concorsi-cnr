<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Segretario</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.6.1/dist/css/bootstrap-italia.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.6.1/dist/js/bootstrap-italia.bundle.min.js" defer></script>
</head>
<body>

  <div class="container my-5">
    <h1 class="mb-4">Dashboard Segretario</h1>
    <p class="lead">Benvenuto! Di seguito trovi l’elenco dei concorsi per cui sei autorizzato.</p>

    <!-- Pulsante per sincronizzazione -->
    <div class="d-flex justify-content-end mb-3">
      <button class="btn btn-outline-primary" onclick="sincronizzaCommissioni()">
        🔄 Sincronizza i dati
      </button>
    </div>

    <!-- Tabella Commissioni -->
    <div class="table-responsive">
      <table class="table table-striped table-hover">
        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>Nome Concorso</th>
            <th>Azioni</th>
          </tr>
        </thead>
        <tbody id="corpo-tabella-commissioni"></tbody>
      </table>
    </div>
  </div>

  <script>
    async function sincronizzaCommissioni() {
      try {
        const res = await fetch('/sync-commissioni');
        const data = await res.json();

        if (!data.success) {
          alert("Errore nella sincronizzazione: " + (data.error || "Errore sconosciuto"));
          return;
        }

        const commissioni = data.commissioni;
        const tbody = document.getElementById('corpo-tabella-commissioni');
        tbody.innerHTML = '';

        commissioni.forEach((c, index) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <th scope="row">${index + 1}</th>
            <td>${c.title}</td>
            <td>
              <a href="/sessioni.html?commission_id=${c.id}" class="btn btn-sm btn-primary">
                Visualizza Sessioni
              </a>
            </td>
          `;
          tbody.appendChild(tr);
        });

      } catch (err) {
        console.error('Errore nella sincronizzazione:', err);
        alert("Errore nella comunicazione con il server.");
      }
    }

    // Esegui la sincronizzazione iniziale all'avvio
    sincronizzaCommissioni();
  </script>

</body>
</html>
