<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Segretario</title>
</head>
<body>
    <h1>Benvenuto nella Dashboard</h1>
    <h2>Sessioni di esame disponibili:</h2>
    <ul id="lista-sessioni"></ul>

    <script>
        async function caricaSessioni() {
            try {
                const res = await fetch('/mie-sessioni-esame');
                const sessioni = await res.json();
                
                const ul = document.getElementById('lista-sessioni');
                sessioni.forEach(sessione => {
                    const li = document.createElement('li');
                    const link = document.createElement('a');
                    link.href = `/gestione-concorso.html?session_id=${sessione.id}`;
                    link.textContent = `${sessione.nome} - ${sessione.giorno} ${sessione.ora} @ ${sessione.luogo}`;
                    li.appendChild(link);
                    ul.appendChild(li);
                });
            } catch (err) {
                console.error('Errore nel caricamento sessioni:', err);
            }
        }

        caricaSessioni();
    </script>
</body>
</html>
