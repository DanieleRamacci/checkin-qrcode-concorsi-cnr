<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard Sessioni</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    h1 { margin-bottom: 10px; }
    #sessioni, #candidati { margin-top: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    tr.checked-in { background-color: #d4edda; }
    tr.not-checked-in { background-color: #f8d7da; }
    .back-button { margin-top: 20px; display: none; }
  </style>
</head>
<body>
  <h1>Dashboard Check-in</h1>

  <div id="sessioni">
    <h2>Sessioni disponibili</h2>
    <ul id="session-list"></ul>
  </div>

  <div id="candidati" style="display:none;">
    <h2 id="session-title"></h2>
    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Cognome</th>
          <th>Documento</th>
          <th>Check-in</th>
        </tr>
      </thead>
      <tbody id="candidate-table-body"></tbody>
    </table>
    <button class="back-button" onclick="tornaIndietro()">Torna alle sessioni</button>
  </div>

  <script>
    async function caricaSessioni() {
      const res = await fetch('/lista-sessioni');
      const sessioni = await res.json();

      const ul = document.getElementById("session-list");
      ul.innerHTML = "";

      sessioni.forEach(sess => {
        const li = document.createElement("li");
        li.innerHTML = `<button onclick="caricaDettagliSessione('${sess.session_id}')">
          ${sess.nome_sessione} (${sess.data_creazione})
        </button>`;
        ul.appendChild(li);
      });
    }

    async function caricaDettagliSessione(session_id) {
      const res = await fetch(`/sessione/${session_id}`);
      const data = await res.json();
      if (!data.success) {
        alert("Errore nel recupero dei dati della sessione");
        return;
      }

      const session = data.session;
      document.getElementById("sessioni").style.display = "none";
      document.getElementById("candidati").style.display = "block";
      document.querySelector(".back-button").style.display = "block";
      document.getElementById("session-title").textContent = session.nome_sessione + " - " + session.data_creazione;

      const tbody = document.getElementById("candidate-table-body");
      tbody.innerHTML = "";
      session.candidates.forEach(c => {
        const row = document.createElement("tr");
        row.className = c.checkin_effettuato ? "checked-in" : "not-checked-in";
        row.innerHTML = `
          <td>${c.nome}</td>
          <td>${c.cognome}</td>
          <td>${c.numero_documento}</td>
          <td>${c.checkin_effettuato ? "si" : "no"}</td>
        `;
        tbody.appendChild(row);
      });
    }

    function tornaIndietro() {
      document.getElementById("sessioni").style.display = "block";
      document.getElementById("candidati").style.display = "none";
      document.querySelector(".back-button").style.display = "none";
    }

    window.onload = caricaSessioni;
  </script>
</body>
</html>
