<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Gestione Concorso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.6.1/dist/css/bootstrap-italia.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.6.1/dist/js/bootstrap-italia.bundle.min.js" defer></script>
</head>
<body>

<!-- HEADER BAR stile AGID -->
<header class="it-header-wrapper" data-bs-target="#header-nav">
  <div class="it-header-slim-wrapper">
    <div class="container-xxl">
      <div class="row">
        <div class="col-12">
          <div class="it-header-slim-wrapper-content">
            <a class="d-none d-lg-block navbar-brand" href="/">🏛 Ente Appartenenza</a>
            <div class="nav-mobile">
              <nav aria-label="Navigazione accessoria">
                <a class="it-opener d-lg-none" data-bs-toggle="collapse" href="#menu1a" role="button" aria-expanded="false" aria-controls="menu4">
                  <span>Ente Appartenenza</span>
                  <svg class="icon" aria-hidden="true"><use href="/bootstrap-italia/dist/svg/sprites.svg#it-expand"></use></svg>
                </a>
                <div class="link-list-wrapper collapse" id="menu1a">
                  <ul class="link-list">
                    <li><a class="dropdown-item list-item" href="#">Link 1</a></li>
                    <li><a class="list-item active" href="#" aria-current="page">Link 2 (Attivo)</a></li>
                  </ul>
                </div>
              </nav>
            </div>
            <div class="it-header-slim-right-zone">
              <div class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                  <span class="visually-hidden">Selezione lingua: lingua selezionata</span>
                  <span>ITA</span>
                  <svg class="icon d-none d-lg-block"><use href="/bootstrap-italia/dist/svg/sprites.svg#it-expand"></use></svg>
                </a>
                <div class="dropdown-menu">
                  <div class="row">
                    <div class="col-12">
                      <div class="link-list-wrapper">
                        <ul class="link-list">
                          <li><a class="dropdown-item list-item" href="#"><span>ITA <span class="visually-hidden">selezionata</span></span></a></li>
                          <li><a class="dropdown-item list-item" href="#"><span>ENG</span></a></li>
                        </ul>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="it-access-top-wrapper">
                <a class="btn btn-primary btn-sm" href="#">Accedi</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>

<main class="container my-5">

  <div id="errore" class="alert alert-danger d-none" role="alert"></div>

  <h1 class="mb-4">Gestione sessione di concorso</h1>

  <div class="mb-3">
    <h2 id="titolo-sessione"></h2>
    <p><strong>📍 Luogo:</strong> <span id="luogo-sessione"></span></p>
    <p><strong>📅 Data e ora:</strong> <span id="data-ora-sessione"></span></p>
    <p><strong>📌 Stato:</strong> <span id="stato-sessione"></span></p>
  </div>

  <button id="scarica" class="btn btn-outline-primary mb-4">
    <svg class="icon icon-sm me-2"><use href="/bootstrap-italia/dist/svg/sprites.svg#it-download"></use></svg>
    Scarica lista candidati
  </button>
  <div id="output" class="mb-3"></div>

  <h2 class="mb-3">Elenco candidati</h2>
  <div class="table-responsive">
        <table class="table table-striped table-hover" id="tabella-candidati">
        <thead class="table-light">
        <tr>
          <th scope="col">#</th>
          <th scope="col">Nome</th>
          <th scope="col">Cognome</th>
          <th scope="col">Documento</th>
          <th scope="col">Check-in</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</main>

<script>
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get('session_id');

  document.getElementById('scarica').addEventListener('click', async () => {
    try {
      const res = await fetch(`/get-candidati?session_id=${sessionId}`);
      const data = await res.json();
      document.getElementById('output').textContent = data.message;
      caricaDatiSessione();
    } catch (err) {
      console.error('Errore:', err);
      document.getElementById('output').textContent = "Errore nel download candidati.";
    }
  });

  function mostraErrore(msg) {
    const div = document.getElementById('errore');
    div.textContent = msg;
    div.classList.remove('d-none');
  }

  async function caricaDatiSessione() {
    try {
      const res = await fetch(`/sessione/${sessionId}`);
      const data = await res.json();

      if (!data.success || !data.session) {
        mostraErrore("Sessione non trovata.");
        return;
      }

      const s = data.session;
      const oggi = new Date().toISOString().slice(0, 10);

      if (oggi !== s.giorno) {
        mostraErrore("⚠️ Attenzione: la sessione non è prevista per la giornata odierna.");
        return;
      }

      if (!s.attiva) {
        mostraErrore("⚠️ La sessione non è attiva. Attivala prima di procedere.");
        return;
      }

      document.getElementById('titolo-sessione').textContent = `Concorso: ${s.nome_sessione}`;
      document.getElementById('luogo-sessione').textContent = s.luogo;
      document.getElementById('data-ora-sessione').textContent = `${s.giorno} – ${s.ora}`;
      document.getElementById('stato-sessione').textContent = s.attiva ? 'ATTIVA 🟢' : 'NON ATTIVA 🔴';

      const tbody = document.querySelector('#tabella-candidati tbody');
      tbody.innerHTML = '';

      s.candidates.forEach((c, index) => {
        const tr = document.createElement('tr');
        tr.className = c.checkin_effettuato ? 'table-success' : 'table-danger';
        tr.innerHTML = `
          <th scope="row">${index + 1}</th>
          <td>${c.nome}</td>
          <td>${c.cognome}</td>
          <td>${c.numero_documento}</td>
          <td>${c.checkin_effettuato ? '✅' : '❌'}</td>
        `;
        tbody.appendChild(tr);
      });

    } catch (err) {
      console.error("Errore nel caricamento sessione:", err);
      mostraErrore("Errore durante il caricamento dei dati.");
    }
  }

  caricaDatiSessione();
</script>
</body>
</html>
