<head>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap-italia@2.6.1/dist/js/bootstrap-italia.bundle.min.js" defer></script>
</head>
<body>

<!-- HEADER BAR stile AGID -->

            <div class="nav-mobile">
              <nav aria-label="Navigazione accessoria">
                <a class="it-opener d-lg-none" data-bs-toggle="collapse" href="#menu1a" role="button" aria-expanded="false" aria-controls="menu4">
                  <span>Ente Appartenenza</span>
                  <svg class="icon" aria-hidden="true"><use href="/bootstrap-italia/dist/svg/sprites.svg#it-expand"></use></svg>
                </a>
                <div class="link-list-wrapper collapse" id="menu1a">
                  <ul class="link-list">
                    <li><a class="dropdown-item list-item" href="https://980849cff71b.ngrok-free.app/scanner">Scanner</a></li>
                    <li><a class="dropdown-item list-item" href="https://980849cff71b.ngrok-free.app/user">user data</a></li>

                  </ul>
                </div>
              </nav>
            </div>
            <div class="it-header-slim-right-zone">
              <div class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                  <span class="visually-hidden">Selezione lingua: lingua selezionata</span>
                  <span>ITA</span>
                  <svg class="icon d-none d-lg-block"><use href="/bootstrap-italia/dist/svg/sprites.svg#it-expand"></use></svg>

                    <div class="col-12">
                      <div class="link-list-wrapper">
                        <ul class="link-list">

        </div>

</header>

<main class="container my-5">

  <!-- Barra informazioni concorso -->
  <div id="info-bar" class="info-bar d-flex justify-content-between flex-wrap align-items-center border rounded px-4 py-3 my-4 bg-light">
    <div><strong>Concorso:</strong> <span id="titolo-sessione">-</span></div>
    <div><strong>📍</strong> <span id="luogo-sessione">-</span></div>
    <div><strong>📅</strong> <span id="data-ora-sessione">-</span></div>
    <div><strong>📌 Stato:</strong> <span id="stato-sessione" class="badge bg-secondary">-</span></div>
  </div>

  <div id="errore" class="alert alert-danger d-none" role="alert"></div>

  <button id="scarica" class="btn btn-outline-primary mb-4">
    <svg class="icon icon-sm me-2"><use href="/bootstrap-italia/dist/svg/sprites.svg#it-download"></use></svg>
    Scarica lista candidati
  </button>
  <div id="output" class="mb-3"></div>

  <h2 class="mb-3">Elenco candidati</h2>
  <div class="table-responsive">
    <table class="table table-striped table-hover" id="tabella-candidati">
      <thead class="table-light">
        <tr>
          <th scope="col">#</th>
          <th scope="col">Nome</th>
          <th scope="col">Cognome</th>
          <th scope="col">Documento</th>
          <th scope="col">Check-in</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</main>

<script>
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get('session_id');
  const erroreDiv = document.getElementById('errore');

  document.getElementById('scarica').addEventListener('click', async () => {
    try {
      const res = await fetch(`/get-candidati?session_id=${sessionId}`);
      const data = await res.json();
      document.getElementById('output').textContent = data.message;
      erroreDiv.innerHTML = ''; // pulizia errori prima di ricaricare
      erroreDiv.classList.add('d-none');
      caricaDatiSessione();
    } catch (err) {
      console.error('Errore:', err);
      document.getElementById('output').textContent = "Errore nel download candidati.";
    }
  });

  function mostraErrore(msg) {
    if (!erroreDiv.innerHTML.includes(msg)) {
      erroreDiv.innerHTML += `<div>${msg}</div>`;
      erroreDiv.classList.remove('d-none');
    }
  }

  function parseItalianDate(str) {
    const [gg, mm, aaaa] = str.split('/');
    return `${aaaa}-${mm.padStart(2, '0')}-${gg.padStart(2, '0')}`;
  }

  function isDocumentExpired(documentDateStr) {
    if (!documentDateStr) return true;
    const [gg, mm, aaaa] = documentDateStr.split('/');
    const docDate = new Date(`${aaaa}-${mm}-${gg}`);
    const today = new Date();
    return docDate < today;
  }

  async function caricaDatiSessione() {
    try {
      const res = await fetch(`/sessione/${sessionId}`);
      const data = await res.json();

      if (!data.success || !data.session) {
        mostraErrore("❌ Sessione non trovata.");
        return;
      }

      const s = data.session;
      const oggi = new Date().toISOString().slice(0, 10);
      const giornoSessione = parseItalianDate(s.giorno);

      if (oggi !== giornoSessione) {
        mostraErrore("⚠️ La sessione non è prevista per la giornata odierna.");
      }

      if (!s.attiva) {
        mostraErrore("⚠️ La sessione non risulta attiva. Procedi solo se autorizzato.");
      }

      // Intestazione sessione
      document.getElementById('titolo-sessione').textContent = s.nome_sessione || '-';
      document.getElementById('luogo-sessione').textContent = s.luogo || '-';
      document.getElementById('data-ora-sessione').textContent = `${s.giorno || '-'} – ${s.ora || '-'}`;
      const statoEl = document.getElementById('stato-sessione');
      statoEl.textContent = s.attiva ? 'Attiva' : 'Non attiva';
      statoEl.className = 'badge ' + (s.attiva ? 'bg-success' : 'bg-danger');

      // Tabella candidati
      const tbody = document.querySelector('#tabella-candidati tbody');
      tbody.innerHTML = '';

      s.candidates.forEach((c, index) => {
        const validita = isDocumentExpired(c.documentDate) ? '❌ Scaduto' : '✅ Valido';
        const tr = document.createElement('tr');
        tr.className = c.checkin_effettuato ? 'table-success' : 'table-danger';
        tr.innerHTML = `
          <th scope="row">${index + 1}</th>
          <td>${c.nome}</td>
          <td>${c.cognome}</td>
          <td>${c.numero_documento}</td>
          <td>${c.checkin_effettuato ? '✅' : '❌'}</td>
          <td>${validita}</td>
        `;
        tbody.appendChild(tr);
      });

      // Aggiunta intestazione se non già presente
      const theadRow = document.querySelector('#tabella-candidati thead tr');
      if (theadRow.children.length === 5) {
        const th = document.createElement('th');
        th.scope = "col";
        th.textContent = 'Validità documento';
        theadRow.appendChild(th);
      }

    } catch (err) {
      console.error("Errore nel caricamento sessione:", err);
      mostraErrore("❌ Errore durante il caricamento dei dati.");
    }
  }

  caricaDatiSessione();
</script>




</body>
</html>
