services:
  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: .
    depends_on:
      - db
      - redis
    expose:
      - "5050"
    environment:
      APP_ENV: "${APP_ENV:-production}"
      APP_VERSION: "${APP_VERSION:-coolify}"
      APP_BUILD_TIME: "${APP_BUILD_TIME:-}"
      DEBUG: "${DEBUG:-0}"
      FLASK_ENV: "${FLASK_ENV:-production}"
      SECRET_KEY: "${SECRET_KEY}"
      BASE_URL: "${BASE_URL}"
      OIDC_CLIENT_ID: "${OIDC_CLIENT_ID}"
      OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET}"
      OIDC_REDIRECT_URI: "${OIDC_REDIRECT_URI}"
      OIDC_AUTH_URL: "${OIDC_AUTH_URL}"
      OIDC_TOKEN_URL: "${OIDC_TOKEN_URL}"
      OIDC_USERINFO_URL: "${OIDC_USERINFO_URL}"
      OIDC_ISSUER: "${OIDC_ISSUER}"
      OIDC_AUDIENCE: "${OIDC_AUDIENCE}"
      OIDC_JWKS_URL: "${OIDC_JWKS_URL}"
      OIDC_ALLOWED_ALGORITHM: "${OIDC_ALLOWED_ALGORITHM:-RS256}"
      POSTGRES_HOST: "db"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "${POSTGRES_DB:-checkin}"
      POSTGRES_USER: "${POSTGRES_USER:-checkin}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      SESSION_TYPE: "${SESSION_TYPE:-redis}"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      COOKIE_SECURE: "${COOKIE_SECURE:-1}"
      SMTP_SERVER: "${SMTP_SERVER:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_STARTTLS: "${SMTP_STARTTLS:-1}"
      MAIL_SENDER: "${MAIL_SENDER:-}"
      ESPERTO_EMAIL: "${ESPERTO_EMAIL:-}"
      BOOTSTRAP_ADMIN_EMAILS: "${BOOTSTRAP_ADMIN_EMAILS:-}"
      FILES_BASE_DIR: "/app/files_liste"
      WEB_CONCURRENCY: "${WEB_CONCURRENCY:-2}"
      GUNICORN_TIMEOUT: "${GUNICORN_TIMEOUT:-120}"
      GUNICORN_EXTRA: "${GUNICORN_EXTRA:---worker-class gthread --threads 4 --keep-alive 10 --graceful-timeout 120 --max-requests 500 --max-requests-jitter 50 --capture-output --access-logfile - --error-logfile -}"
    volumes:
      - backend-instance:/app/instance
      - backend-files:/app/files_liste

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-checkin}"
      POSTGRES_USER: "${POSTGRES_USER:-checkin}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "PING"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  backend-instance:
  backend-files:
  pgdata:
  redisdata:
